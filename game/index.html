function updateRateColor(){
  const el = document.getElementById("rateView");
  if(!el) return;

  let rate = Number(localStorage.getItem("rate"));
  if (isNaN(rate)) rate = 700;

  el.textContent = rate;

  el.classList.remove(
    "rate-1","rate-2","rate-3","rate-4",
    "rate-5","rate-6","rate-7","rate-8","rate-9"
  );

  if(rate < 600){
    el.classList.add("rate-1");
  } else if(rate < 800){
    el.classList.add("rate-2");
  } else if(rate < 1000){
    el.classList.add("rate-3");
  } else if(rate < 1200){
    el.classList.add("rate-4");
  } else if(rate < 1400){
    el.classList.add("rate-5");
  } else if(rate < 1600){
    el.classList.add("rate-6");
  } else if(rate < 1700){
    el.classList.add("rate-7");
  } else if(rate < 1800){
    el.classList.add("rate-8");
  } else if(rate < 2000){
    el.classList.add("rate-9");
    } else {
  el.classList.add("rate-9");
}

function getCurrentBand(){
  return rateBands.find(
    b => rate >= b.min && rate <= b.max
  );
}

function pickWordByRateLimit(){

  const band = getCurrentBand();

  const weighted = [];

  Object.entries(band.ranks).forEach(([rank,data])=>{

const wordsOfRank =
  words
  .map((w,i)=>({...w,index:i}))
    .filter(w =>
      w.rank===Number(rank) &&
      !usedIndexes.includes(w.index)
    );

    for(let i=0;i<data.weight;i++){
      weighted.push(
        wordsOfRank[
          Math.floor(Math.random()*wordsOfRank.length)
        ]
      );
    }

  });


  if(weighted.length === 0){
    finishGame();
    return null;
  }

  const picked =
    weighted[Math.floor(Math.random()*weighted.length)];

  usedIndexes.push(picked.index);
  return picked;
}

function getTitleClass(title){
  const classes = [];

  if(title === "神話級"){
    classes.push("rainbow");
  }

  if(title === "生ける伝説"){
    classes.push("redsp");
  }

  if(title === "EnglishMaster"){
    classes.push("goldsp");
  }

  if(title === "帰国子女" || title === "語彙の覇王"){
    classes.push("glow");
  }

  // ===== フォント系（称号個別）=====
  if(title === "神話級"){
    classes.push("font-myth");
  }

  if(title === "EnglishMaster"){
    classes.push("font-en");
  }

  return classes.join(" ");
}

async function compressImage(file){

  return new Promise(resolve=>{

    const img =
      new Image();

    img.onload=()=>{

      const canvas =
        document.createElement(
          "canvas"
        );

      const max=128;

      let w=img.width;
      let h=img.height;

      if(w>h){

        if(w>max){

          h*=max/w;
          w=max;

        }

      }else{

        if(h>max){

          w*=max/h;
          h=max;

        }

      }

      canvas.width=w;
      canvas.height=h;

      canvas
        .getContext("2d")
        .drawImage(
          img,
          0,
          0,
          w,
          h
        );

      resolve(
        canvas.toDataURL(
          "image/webp",
          0.6
        )
      );

    };

    img.src =
      URL.createObjectURL(
        file
      );

  });

}

}

  let ranks = [];

  if(rr===0){          // ビギナー
    ranks=[1];
  }
  else if(rr===1){     // ブロンズ
    ranks=[2];
  }
  else if(rr===2){     // シルバー
    ranks=[3];
  }
  else if(rr===3){     // ゴールド
    ranks=[4];
  }
  else if(rr===4){     // プラチナ
    ranks=[5];
  }
  else if(rr===5){     // レジェンド
    ranks=[6,7];
  }
  else{                // マスター・イモータル
    ranks=[8,9,10];
  }

  const targetRank =
    ranks[Math.floor(Math.random()*ranks.length)];

const pool =
  words
    .map((w,i)=>({...w,index:i}))
    .filter(w =>
      w.rank === targetRank &&
      !usedIndexes.includes(w.index)
    );

if(pool.length === 0){
  finishGame();
  return;
}

const picked =
  pool[Math.floor(Math.random()*pool.length)];

current = picked;
usedIndexes.push(picked.index);
}else{
current = pickWordByRateLimit();
if(!current) return;
}
if(!current) return;

const lengths = current.en
  .split(" ")
  .map(w => w.length)
  .join(",");

question.textContent =
  `${current.jp} (${lengths})`;

answer.value="";
msg.textContent="";
countView.textContent=q+1;

function checkAnswer(){
if(locked) return;
locked = true;

document.getElementById("answerBtn").disabled = true;
document.getElementById("skipBtn").disabled = true;

  const ok =
    answer.value.trim().toLowerCase() ===
    current.en.toLowerCase();
    let changeValue=0;

if(mode === "rank"){
  if(ok){
    correct++;
    pendingRankRate += 1;
    changeValue = 1;
    msg.textContent = "⭕ 正解（ランク +1）";
    playSe("correctSe");
  }else{
    pendingRankRate -= 1;
    changeValue = -1;
    msg.textContent = "❌ 不正解（ランク -1）";
    playSe("wrongSe");
  }
  }else{
    const band = getCurrentBand();
    const rateSet = band.ranks[current.rank];

    if(ok){
      correct++;
      pendingRate += rateSet.correct;
      msg.textContent = "⭕ 正解（+" + rateSet.correct + "）";
      changeValue = rateSet.correct;
      playSe("correctSe");
    }else{
      pendingRate -= rateSet.miss;
      msg.textContent =
        "❌ 正解: " + current.en + "（-" + rateSet.miss + "）";
        changeValue = -rateSet.miss;
        playSe("wrongSe");
    }
  }

resultHistory.push({
  jp: current.jp,
  en: current.en,
  ok: ok,
  change: changeValue
});
q++;

if(q >= 10){
  setTimeout(fadeToResult, 400);
}else{
  setTimeout(nextQuestion, 400);
}
}

function skipQuestion(){
if(locked) return;
locked = true;

document.getElementById("answerBtn").disabled = true;
document.getElementById("skipBtn").disabled = true;

  if(mode === "rank"){
    pendingRankRate -= 1;
    resultHistory.push({
  jp:current.jp,
  en:current.en,
  ok:false,
  change:-1
});
    msg.textContent = "スキップ（ランク -1）";
    playSe("wrongSe");
  }else{
    const band = getCurrentBand();
    const rateSet = band.ranks[current.rank];
    pendingRate -= rateSet.miss;
    resultHistory.push({
  jp:current.jp,
  en:current.en,
  ok:false,
  change:-rateSet.miss
});
    msg.textContent = "スキップ（-" + rateSet.miss + "）";
    playSe("wrongSe");
  }
q++;
if(q >= 10){
  setTimeout(fadeToResult, 400);
}else{
  setTimeout(nextQuestion, 400);
}
}
