<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="google-site-verification" content="VmoHGkew9YixJCY6_gTrhPTekj4eKYKDvZ9lK_Ax06o" />
<title>英単語Master 完全版</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}
body{margin:0;background:linear-gradient(135deg,#eef5ff,#f8fbff);font-family:'Zen Maru Gothic',sans-serif;text-align:center}
.screen{display:none;padding:20px}.active{display:block}
.card{max-width:850px;margin:auto;background:rgba(255,255,255,.95);border-radius:28px;padding:24px;box-shadow:0 10px 30px rgba(0,0,0,.15)}
.top{display:flex;justify-content:center;align-items:center;gap:20px}
#icon{width:120px;height:120px;border-radius:50%;border:3px solid #333;object-fit:cover;background:#fff}
.rankNum{font-size:64px;font-weight:900}
.bar{height:22px;background:#ddd;border-radius:999px;overflow:hidden}
.fill{height:100%;width:0;transition:.4s}
#rateBar{background:linear-gradient(90deg,#005bbb,#2f86ff)}
#xpBar{background:linear-gradient(90deg,#00c853,#4cff9f)}
button{border:none;border-radius:18px;padding:12px 22px;font-size:20px;font-weight:900;color:#fff;background:#2f86ff;margin:6px;cursor:pointer}
input,textarea{padding:10px;border-radius:12px;border:1px solid #ccc;width:80%}
.menu{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.tile{padding:20px;border-radius:18px;color:#fff;font-weight:900;cursor:pointer}
.a{background:#2f86ff}.b{background:#14a44d}.c{background:#ff9800}
</style>
</head>
<body>

<div id="profile" class="screen active">
<div class="card">
<h1>英単語Master</h1>
<div class="top">
<img id="icon">
<div>
<div id="userName">Player</div>
<div class="rankNum" id="rankNum">1</div>
</div>
</div>

<h3>レート : <span id="rateView">0</span></h3>
<div class="bar"><div id="rateBar" class="fill"></div></div>
<div id="rateCycleText">0 / 50</div>

<h3>XP</h3>
<div id="xpText">0 / 10</div>
<div class="bar"><div id="xpBar" class="fill"></div></div>

<p>称号 : <span id="titleView">見習い学習者</span></p>
<p>ランクレート : <span id="rankRate">Beginner</span></p>

<button onclick="showScreen('settings')">設定</button>
<button onclick="showScreen('mode')">ゲームへ</button>
</div>
</div>

<div id="settings" class="screen">
<div class="card">
<h2>設定</h2>
<input id="nameInput" placeholder="ユーザー名"><br><br>
<input type="file" id="iconUpload"><br><br>
<label><input type="checkbox" id="soundToggle"> 効果音ON/OFF</label><br><br>
<textarea id="authorType" placeholder="作者説明"></textarea><br><br>
<button onclick="saveSettings()">保存</button>
<button onclick="showScreen('profile')">戻る</button>
</div>
</div>

<div id="mode" class="screen">
<div class="card">
<h2>モード選択</h2>
<div class="menu">
<div class="tile a" onclick="startGame('jp-en')">日→英</div>
<div class="tile c" onclick="startGame('rank')">ランク</div>
</div>
<button onclick="showScreen('profile')">戻る</button>
</div>
</div>

<div id="game" class="screen">
<div class="card">
<h2 id="question"></h2>
<input id="answer"><br><br>
<button onclick="checkAnswer()">回答</button>
<button onclick="skipQuestion()">スキップ</button>
<p id="msg"></p>
<p><span id="countView">1</span>/10</p>
</div>
</div>

<div id="result" class="screen">
<div class="card">
<h2>結果</h2>
<div id="resultText"></div>
<div id="profileButton"></div>
</div>
</div>

<script>
/* ===== 追加① ランクレート ===== */
let rankRate = +localStorage.getItem("rankRate") || 0;

/* ===== 追加② ランク定義 ===== */
const rankRanks = [
  {name:"ビギナー",min:0},
  {name:"ブロンズ",min:10},
  {name:"シルバー",min:30},
  {name:"ゴールド",min:60},
  {name:"プラチナ",min:100},
  {name:"レジェンド",min:150},
  {name:"マスター",min:200},
  {name:"イモータル",min:250},
];
function getRankRank(){
  for(let i=rankRanks.length-1;i>=0;i--){
    if(rankRate>=rankRanks[i].min) return i;
  }
  return 0;
}

/* ===== 既存 ===== */
let rate=+localStorage.getItem("rate")||1500;
let xp=+localStorage.getItem("xp")||0;
let locked=false,lastWord=null,current=null;
let q=0,correct=0,pendingRate=0,mode="jp-en";

const words=[
{jp:"りんご",en:"apple",rank:1},
{jp:"ねこ",en:"cat",rank:1},
{jp:"いぬ",en:"dog",rank:1},
{jp:"バナナ",en:"banana",rank:1},
{jp:"本",en:"book",rank:1},
{jp:"箱",en:"box",rank:1},
{jp:"星",en:"star",rank:1},
{jp:"あお",en:"blue",rank:1},
{jp:"あか",en:"red",rank:1},
{jp:"そら",en:"sky",rank:1},

{jp:"学校",en:"school",rank:2},
{jp:"時間",en:"time",rank:2},
{jp:"ベッド",en:"bed",rank:2},
{jp:"みどり",en:"green",rank:2},
{jp:"花",en:"flower",rank:2},
{jp:"数学",en:"math",rank:2},
{jp:"英語",en:"english",rank:2},
{jp:"金曜日",en:"friday",rank:2},
{jp:"日曜日",en:"sunday",rank:2},
{jp:"月曜日",en:"monday",rank:2},

{jp:"火曜日",en:"tuesday",rank:3},
{jp:"友達",en:"friend",rank:3},
{jp:"土曜日",en:"saturday",rank:3},

{jp:"先生",en:"teacher",rank:4},
{jp:"水曜日",en:"wednesday",rank:4},
{jp:"木曜日",en:"thursday",rank:4},
{jp:"経済", en:"economy", rank:5},
{jp:"哲学", en:"philosophy", rank:5},

{jp:"環境", en:"environment", rank:6},
{jp:"文化", en:"culture", rank:6},

{jp:"民主主義", en:"democracy", rank:7},
{jp:"産業革命", en:"industrial revolution", rank:7},

{jp:"相対性理論", en:"theory of relativity", rank:8},
{jp:"量子力学", en:"quantum mechanics", rank:8},

{jp:"意識", en:"consciousness", rank:9},
{jp:"存在論", en:"ontology", rank:9},

{jp:"形而上学", en:"metaphysics", rank:10},
{jp:"超弦理論", en:"string theory", rank:10},
];
/* ===== 問題ランク別 レート変動（完全手動）===== */
/*
  key = 問題ランク（1〜10）
  correct = 正解時のレート増加
  miss    = ミス時のレート減少
*/
const rateByQuestionRank = {
  1:  { correct: 3,  miss: 6 },
  2:  { correct: 4,  miss: 6 },
  3:  { correct: 5,  miss: 5 },
  4:  { correct: 6,  miss: 5 },
  5:  { correct: 7,  miss: 4 },
  6:  { correct: 8,  miss: 4 },
  7:  { correct: 9,  miss: 3 },
  8:  { correct: 11, miss: 3 },
  9:  { correct: 13, miss: 2 },
  10: { correct: 15, miss: 2 },
};

/* ===== レートごとの出題ランク制限 ===== */
const rateQuestionLimit = [
  { min: 0,    max: 1099, minRank: 1, maxRank: 3 },
  { min: 1100, max: 1299, minRank: 1, maxRank: 4 },
  { min: 1300, max: 1499, minRank: 2, maxRank: 5 },
  { min: 1500, max: 1699, minRank: 3, maxRank: 6 },
  { min: 1700, max: 1899, minRank: 4, maxRank: 7 },
  { min: 1900, max: 9999, minRank: 5, maxRank: 8 },
];
function getQuestionRankLimit(rate){
  for(const r of rateQuestionLimit){
    if(rate >= r.min && rate <= r.max){
      return r;
    }
  }
  return rateQuestionLimit[0];
}

function pickWordByRateLimit(){
  const limit = getQuestionRankLimit(rate);

  const pool = words.filter(w =>
    w.rank >= limit.minRank && w.rank <= limit.maxRank
  );

  // 保険（ここ重要）
  if(pool.length === 0){
    return words[Math.floor(Math.random()*words.length)];
  }

  return pool[Math.floor(Math.random()*pool.length)];
}
function showScreen(id){
document.querySelectorAll(".screen").forEach(x=>x.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

function rankNeed(l){if(l==1)return 10;if(l==2)return 15;if(l==3)return 25;return Math.floor(10+l*l*1.5)}
function getRank(){let lv=1,t=xp;while(t>=rankNeed(lv)){t-=rankNeed(lv);lv++}return lv}

function updateProfile(){
userName.textContent=localStorage.getItem("username")||"Player";
nameInput.value=userName.textContent;
rankNum.textContent=getRank();

rateView.textContent=rate;
rateBar.style.width=((rate%50)/50*100)+"%";
rateCycleText.textContent=(rate%50)+" / 50";

let lv=getRank(),used=0;
for(let i=1;i<lv;i++)used+=rankNeed(i);
let cur=xp-used,next=rankNeed(lv);

xpText.textContent=cur+" / "+next;
xpBar.style.width=(cur/next*100)+"%";

const r=getRankRank();
rankRate.textContent=rankRanks[r].name+" ("+rankRate+")";

if(localStorage.getItem("icon")) icon.src=localStorage.getItem("icon");
authorType.value=localStorage.getItem("authorType")||"";
soundToggle.checked=localStorage.getItem("sound")!=="off";
}

function saveSettings(){
localStorage.setItem("username",nameInput.value||"Player");
localStorage.setItem("authorType",authorType.value);
localStorage.setItem("sound",soundToggle.checked?"on":"off");
updateProfile();
showScreen("profile");
}

iconUpload.addEventListener("change",e=>{
const f=e.target.files[0]; if(!f)return;
const r=new FileReader();
r.onload=x=>{localStorage.setItem("icon",x.target.result);icon.src=x.target.result;};
r.readAsDataURL(f);
});

function startGame(m){
mode=m;q=0;correct=0;pendingRate=0;
showScreen("game");
nextQuestion();
}

function nextQuestion(){
locked=false;
if(q>=10)return finishGame();

if(mode==="rank"){
  const rr=getRankRank();
  let targetRank=1;
  if(rr<=1)targetRank=1;
  else if(rr===2)targetRank=2;
  else if(rr===3)targetRank=3;
  else if(rr===4)targetRank=4;
  else if(rr===5)targetRank=5;
  else if(rr===6)targetRank=6;
  else targetRank=Math.floor(Math.random()*4)+7;

  const pool=words.filter(w=>w.rank===targetRank);
  current=pool[Math.floor(Math.random()*pool.length)];
}else{
  current = pickWordByRateLimit();
}

question.textContent=current.jp;
answer.value="";
msg.textContent="";
countView.textContent=q+1;
}

function checkAnswer(){
  if(locked) return;
  locked = true;
  q++;

  const ok = answer.value.trim().toLowerCase() === current.en.toLowerCase();

  // ★ ここが手動設定方式の核心
  const r = current.rank;
  const rateSet = rateByQuestionRank[r] || { correct: 5, miss: 5 };

  if(ok){
    correct++;
    pendingRate += rateSet.correct;
    if(mode === "rank") rankRate++;
    msg.textContent = "⭕ 正解 (+" + rateSet.correct + ")";
  }else{
    pendingRate -= rateSet.miss;
    if(mode === "rank") rankRate = Math.max(0, rankRate - 1);
    msg.textContent = "❌ 正解: " + current.en + " (-" + rateSet.miss + ")";
  }

  setTimeout(nextQuestion, 400);
}

function skipQuestion(){
  if(locked) return;
  locked = true;
  q++;

  const r = current.rank;
  const rateSet = rateByQuestionRank[r] || { miss: 5 };

  pendingRate -= rateSet.miss;
  if(mode === "rank") rankRate = Math.max(0, rankRate - 1);
  msg.textContent = "スキップ (-" + rateSet.miss + ")";

  setTimeout(nextQuestion, 400);
}

async function finishGame(){
rate=Math.max(0,rate+pendingRate);
xp+=correct*10;
localStorage.setItem("rate",rate);
localStorage.setItem("xp",xp);
localStorage.setItem("rankRate",rankRate);

showScreen("result");
resultText.innerHTML="正解数 : "+correct+"/10<br>レート変動 : "+pendingRate+"<br>現在レート : "+rate;
profileButton.innerHTML='<button onclick="backProfile()">プロフィールへ</button>';
}

function backProfile(){updateProfile();showScreen("profile");}

document.addEventListener("keydown",e=>{
if(e.key==="Enter" && document.getElementById("game").classList.contains("active")) checkAnswer();
});

updateProfile();
</script>
</body>
</html>
