function getCurrentBand(){
  return rateBands.find(
    b => rate >= b.min && rate <= b.max
  );
}

function pickWordByRateLimit(){

  const band = getCurrentBand();

  const weighted = [];

  Object.entries(band.ranks).forEach(([rank,data])=>{

    const wordsOfRank =
      words.filter(w=>w.rank===Number(rank));

    for(let i=0;i<data.weight;i++){
      weighted.push(
        wordsOfRank[
          Math.floor(Math.random()*wordsOfRank.length)
        ]
      );
    }

  });

  return weighted[
    Math.floor(Math.random()*weighted.length)
  ];
}

function showScreen(id){

  const homeBgm =
    document.getElementById("homeBgm");

  document
    .querySelectorAll(".screen")
    .forEach(x=>x.classList.remove("active"));

  document
    .getElementById(id)
    .classList.add("active");

  if(id==="profile"){
    homeBgm.play().catch(()=>{});
  }
}

function rankNeed(l){if(l==1)return 10;if(l==2)return 15;if(l==3)return 25;return Math.floor(10+l*l*1.5)}
function getRank(){let lv=1,t=xp;while(t>=rankNeed(lv)){t-=rankNeed(lv);lv++}return lv}

function updateProfile(){
userName.textContent=localStorage.getItem("username")||"Player";
nameInput.value=userName.textContent;
rankNum.textContent=getRank();

rateView.textContent=rate;
rateBar.style.width=((rate%50)/50*100)+"%";
rateCycleText.textContent=(rate%50)+" / 50";

let lv=getRank(),used=0;
for(let i=1;i<lv;i++)used+=rankNeed(i);
let cur=xp-used,next=rankNeed(lv);

xpText.textContent=cur+" / "+next;
xpBar.style.width=(cur/next*100)+"%";

const r=getRankRank();
const rankRateElement =
  document.getElementById("rankRate");

rankRateElement.textContent =
  rankRanks[r].name + " (" + rankRate + ")";
const nextRankMin =
  rankRanks[r+1]
    ? rankRanks[r+1].min
    : rankRanks[r].min + 50;

const currentMin =
  rankRanks[r].min;

const progress =
  rankRate - currentMin;

const need =
  nextRankMin - currentMin;
document.getElementById("rankRateText").textContent =
  progress + " / " + need;

const cells = 20;

const filled =
  Math.floor(progress / need * cells);

const grid =
  document.getElementById("rankRateGrid");

grid.innerHTML = "";

grid.style.gridTemplateColumns =
  `repeat(${cells}, 1fr)`;

for(let i=0;i<cells;i++){

  const cell = document.createElement("div");
  cell.className = "rankCell";

  if(i < filled){
    cell.classList.add("on");
  }

  grid.appendChild(cell);
}

if(localStorage.getItem("icon")) icon.src=localStorage.getItem("icon");
authorType.value=localStorage.getItem("authorType")||"";
soundToggle.checked=localStorage.getItem("sound")!=="off";
}

function saveSettings(){
localStorage.setItem("username",nameInput.value||"Player");
localStorage.setItem("authorType",authorType.value);
localStorage.setItem("sound",soundToggle.checked?"on":"off");
updateProfile();
document.addEventListener("click", () => {
  homeBgm.play().catch(()=>{});
}, { once:true });
showScreen("profile");
}

iconUpload.addEventListener("change",e=>{
const f=e.target.files[0]; if(!f)return;
const r=new FileReader();
r.onload=x=>{localStorage.setItem("icon",x.target.result);icon.src=x.target.result;};
r.readAsDataURL(f);
});

function startGame(m){

  mode=m;
  q=0;
  correct=0;
  pendingRate=0;

  showScreen("game");
  nextQuestion();
}

function nextQuestion(){
locked=false;
if(q>=10)return finishGame();
console.log("rankRate =", rankRate);
if(mode==="rank"){

  const rr = getRankRank();

  let ranks = [];

  if(rr===0){          // ビギナー
    ranks=[1];
  }
  else if(rr===1){     // ブロンズ
    ranks=[2];
  }
  else if(rr===2){     // シルバー
    ranks=[3];
  }
  else if(rr===3){     // ゴールド
    ranks=[4];
  }
  else if(rr===4){     // プラチナ
    ranks=[5];
  }
  else if(rr===5){     // レジェンド
    ranks=[6,7];
  }
  else{                // マスター・イモータル
    ranks=[8,9,10];
  }

  const targetRank =
    ranks[Math.floor(Math.random()*ranks.length)];

  const pool =
    words.filter(w=>w.rank===targetRank);

  current =
    pool[Math.floor(Math.random()*pool.length)];
}else{
  current = pickWordByRateLimit();
}

question.textContent=current.jp;
answer.value="";
msg.textContent="";
countView.textContent=q+1;
}

function checkAnswer(){
  if(locked) return;
  locked = true;
  q++;

  const ok = answer.value.trim().toLowerCase() === current.en.toLowerCase();

  // ★ ここが手動設定方式の核心
  const band = getCurrentBand();
const rateSet = band.ranks[current.rank];

if(ok){
  document.getElementById("correctSe").currentTime = 0;
  document.getElementById("correctSe").play();

  correct++;

  if(mode==="rank"){
    rankRate++;
console.log("正解後 rankRate =", rankRate);
  }else{
    pendingRate += rateSet.correct;
  }
    msg.textContent = "⭕ 正解 (+" + rateSet.correct + ")";
}else{
  document.getElementById("wrongSe").currentTime = 0;
  document.getElementById("wrongSe").play();

  if(mode==="rank"){
    rankRate = Math.max(0, rankRate - 1);
  }else{
    pendingRate -= rateSet.miss;
  }
    msg.textContent = "❌ 正解: " + current.en + " (-" + rateSet.miss + ")";
  }

  setTimeout(nextQuestion, 400);
}

function skipQuestion(){
  if(locked) return;
  locked = true;
  document.getElementById("wrongSe").currentTime = 0;
  document.getElementById("wrongSe").play();
  q++;

const band = getCurrentBand();
const rateSet = band.ranks[current.rank];

if(mode==="rank"){
  rankRate = Math.max(0, rankRate - 1);
  msg.textContent = "スキップ (ランクレート -1)";
}else{
  pendingRate -= rateSet.miss;
  msg.textContent = "スキップ (-" + rateSet.miss + ")";
}

  setTimeout(nextQuestion, 400);
}

async function finishGame(){
const questionBgm =
  document.getElementById("questionBgm");

if(questionBgm){
  questionBgm.pause();
  questionBgm.currentTime = 0;
}

  if(mode!=="rank"){
    rate=Math.max(0,rate+pendingRate);
    localStorage.setItem("rate",rate);
  }

  xp+=correct*10;

  localStorage.setItem("xp",xp);
  localStorage.setItem("rankRate",rankRate);

showScreen("result");
if(mode==="rank"){

  resultText.innerHTML =
    "正解数 : " + correct + "/10<br>" +
    "ランクレート : " + rankRate + "<br>" +
    "ランク : " + rankRanks[getRankRank()].name;

}else{

  resultText.innerHTML =
    "正解数 : " + correct + "/10<br>" +
    "レート変動 : " + pendingRate + "<br>" +
    "現在レート : " + rate;

}
profileButton.innerHTML='<button onclick="backProfile()">プロフィールへ</button>';
}

function backProfile(){updateProfile();showScreen("profile");}


document.addEventListener("keydown",e=>{
if(e.key==="Enter" && document.getElementById("game").classList.contains("active")) checkAnswer();
});
const bgWordList = [
"apple","school","friend","teacher","book",
"environment","culture","democracy",
"economy","philosophy","knowledge",
"study","education","lesson","quiz",
"science","history","english","math",
"future","success","language","master"
];

function spawnWord(){

  const word = document.createElement("div");
  word.className = "bgWord";

  word.textContent =
    bgWordList[Math.floor(Math.random()*bgWordList.length)];

  word.style.top = Math.random()*90 + "%";

  word.style.fontSize =
    (30 + Math.random()*50) + "px";

  word.style.left = "110vw";

  word.style.animationDuration =
    (15 + Math.random()*20) + "s";

  document.getElementById("bgWords").appendChild(word);

  word.addEventListener("animationend",()=>{
    word.remove();
  });
}

setInterval(spawnWord,1000);

updateProfile();

homeBgm.play().catch(()=>{});
</script>
