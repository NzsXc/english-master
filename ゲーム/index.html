h1::after{
  content:"";
  position:absolute;
  top:-20%;
  left:-50%;

  width:40%;
  height:140%;

  background:linear-gradient(
    90deg,
    transparent,
    rgba(255,255,255,0.8),
    transparent
  );

  transform:skewX(-25deg);

  animation:shine 4s infinite;
}

@keyframes shine{

  0%{
    left:-60%;
    opacity:0;
  }

  5%{
    opacity:1;
  }

  40%{
    left:120%;
    opacity:0;
  }

  100%{
    left:120%;
    opacity:0;
  }

}

<script>
function updateRateColor(){
  const el = document.getElementById("rateView");
  if(!el) return;

  let rate = Number(localStorage.getItem("rate"));
  if (isNaN(rate)) rate = 500;

  el.textContent = rate;

  el.classList.remove(
    "rate-1","rate-2","rate-3","rate-4",
    "rate-5","rate-6","rate-7","rate-8","rate-9"
  );

  if(rate < 600){
    el.classList.add("rate-1");
  } else if(rate < 800){
    el.classList.add("rate-2");
  } else if(rate < 1000){
    el.classList.add("rate-3");
  } else if(rate < 1200){
    el.classList.add("rate-4");
  } else if(rate < 1400){
    el.classList.add("rate-5");
  } else if(rate < 1600){
    el.classList.add("rate-6");
  } else if(rate < 1700){
    el.classList.add("rate-7");
  } else if(rate < 1800){
    el.classList.add("rate-8");
  } else if(rate < 2000){
    el.classList.add("rate-9");
    } else {
  // 1800以上は全部ここ
  el.classList.add("rate-9");
}
  }

function getCurrentBand(){
  return rateBands.find(
    b => rate >= b.min && rate <= b.max
  );
}

function pickWordByRateLimit(){

  const band = getCurrentBand();

  const weighted = [];

  Object.entries(band.ranks).forEach(([rank,data])=>{

const wordsOfRank =
  words
    .map((w,i)=>({...w,index:i}))
    .filter(w =>
      w.rank===Number(rank) &&
      !usedIndexes.includes(w.index)
    );

    for(let i=0;i<data.weight;i++){
      weighted.push(
        wordsOfRank[
          Math.floor(Math.random()*wordsOfRank.length)
        ]
      );
    }

  });


  if(weighted.length === 0){
    finishGame();
    return null;
  }

  const picked =
    weighted[Math.floor(Math.random()*weighted.length)];

  usedIndexes.push(picked.index);
  return picked;
}

function rankNeed(l){if(l==1)return 10;if(l==2)return 15;if(l==3)return 25;return Math.floor(10+l*l*1.5)}
function getRank(){let lv=1,t=xp;while(t>=rankNeed(lv)){t-=rankNeed(lv);lv++}return lv}

function updateProfile(){
userName.textContent=localStorage.getItem("username")||"Player";
nameInput.value=userName.textContent;
rankNum.textContent=getRank();

rateView.textContent=rate;
rateBar.style.width=((rate%50)/50*100)+"%";
rateCycleText.textContent=(rate%50)+" / 50";

let lv=getRank(),used=0;
for(let i=1;i<lv;i++)used+=rankNeed(i);
let cur=xp-used,next=rankNeed(lv);

xpText.textContent=cur+" / "+next;
xpBar.style.width=(cur/next*100)+"%";

const r=getRankRank();
const rankRateElement =
  document.getElementById("rankRate");

rankRateElement.textContent =
  rankRanks[r].name + " (" + rankRate + ")";
const nextRankMin =
  rankRanks[r+1]
    ? rankRanks[r+1].min
    : rankRanks[r].min + 50;

const currentMin =
  rankRanks[r].min;

const progress =
  rankRate - currentMin;

const need =
  nextRankMin - currentMin;
document.getElementById("rankRateText").textContent =
  progress + " / " + need;

const cells = 20;

const filled =
  Math.floor(progress / need * cells);

const grid =
  document.getElementById("rankRateGrid");

grid.innerHTML = "";

grid.style.gridTemplateColumns =
  `repeat(${cells}, 1fr)`;

for(let i=0;i<cells;i++){

  const cell = document.createElement("div");
  cell.className = "rankCell";

  if(i < filled){
    cell.classList.add("on");
  }

  grid.appendChild(cell);
}

if(localStorage.getItem("icon")) icon.src=localStorage.getItem("icon");
authorType.value=localStorage.getItem("authorType")||"";
soundToggle.checked=localStorage.getItem("sound")!=="off";
}

 const homeBgm =

updateProfile();
document.addEventListener("click", () => {
if(localStorage.getItem("sound")!=="off"){

}
}, { once:true });
showScreen("profile");
}

  q=0;
  correct=0;
  pendingRate=0;
  resultHistory=[];
  pendingRankRate=0; // ★ 
    usedIndexes = [];   // ★ 追加（毎回10問でリセット）

  const questionBgm =
    document.getElementById("questionBgm");

  if(questionBgm){
    questionBgm.currentTime = 0;
  if(localStorage.getItem("sound")!=="off"){
  questionBgm.play().catch(()=>{});
}
  }

  mode=m;
  q=0;
  correct=0;
  pendingRate=0;

  showScreen("game");
  nextQuestion();
}

function nextQuestion(){
locked=false;
if(q>=10){
  fadeToResult();
  return;
}
console.log("rankRate =", rankRate);
if(mode==="rank"){

  const rr = getRankRank();

  let ranks = [];

  if(rr===0){          // ビギナー
    ranks=[1];
  }
  else if(rr===1){     // ブロンズ
    ranks=[2];
  }
  else if(rr===2){     // シルバー
    ranks=[3];
  }
  else if(rr===3){     // ゴールド
    ranks=[4];
  }
  else if(rr===4){     // プラチナ
    ranks=[5];
  }
  else if(rr===5){     // レジェンド
    ranks=[6,7];
  }
  else{                // マスター・イモータル
    ranks=[8,9,10];
  }

  const targetRank =
    ranks[Math.floor(Math.random()*ranks.length)];

const pool =
  words
    .map((w,i)=>({...w,index:i}))
    .filter(w =>
      w.rank === targetRank &&
      !usedIndexes.includes(w.index)
    );

if(pool.length === 0){
  finishGame();
  return;
}

const picked =
  pool[Math.floor(Math.random()*pool.length)];

current = picked;
usedIndexes.push(picked.index);
}else{
current = pickWordByRateLimit();
if(!current) return;
}
if(!current) return;
question.textContent=current.jp;
answer.value="";
msg.textContent="";
countView.textContent=q+1;
}

function checkAnswer(){
  if(locked) return;
  locked = true;
  q++;

  const ok =
    answer.value.trim().toLowerCase() ===
    current.en.toLowerCase();
    let changeValue=0;

if(mode === "rank"){
  if(ok){
    correct++;
    pendingRankRate += 1;
    changeValue = 1;
    msg.textContent = "⭕ 正解（ランク +1）";
    playSe("correctSe");
  }else{
    pendingRankRate -= 1;
    changeValue = -1;
    msg.textContent = "❌ 不正解（ランク -1）";
    playSe("wrongSe");
  }
  }else{
    const band = getCurrentBand();
    const rateSet = band.ranks[current.rank];

    if(ok){
      correct++;
      pendingRate += rateSet.correct;
      msg.textContent = "⭕ 正解（+" + rateSet.correct + "）";
      changeValue = rateSet.correct;
      playSe("correctSe");
    }else{
      pendingRate -= rateSet.miss;
      msg.textContent =
        "❌ 正解: " + current.en + "（-" + rateSet.miss + "）";
        changeValue = -rateSet.miss;
        playSe("wrongSe");
    }
  }

  // ★ ここが重要：存在確認
resultHistory.push({
  jp:current.jp,
  en:current.en,
  ok:ok,
  change:changeValue
});

if(typeof nextQuestion === "function"){
  setTimeout(nextQuestion, 400);
}else{
  console.error("nextQuestion が未定義");
  locked = false;
}
}

function skipQuestion(){
  if(locked) return;
  locked = true;
  q++;

  if(mode === "rank"){
    pendingRankRate -= 1;
    resultHistory.push({
  jp:current.jp,
  en:current.en,
  ok:false,
  change:-1
});
    msg.textContent = "スキップ（ランク -1）";
    playSe("wrongSe");
  }else{
    const band = getCurrentBand();
    const rateSet = band.ranks[current.rank];
    pendingRate -= rateSet.miss;
    resultHistory.push({
  jp:current.jp,
  en:current.en,
  ok:false,
  change:-rateSet.miss
});
    msg.textContent = "スキップ（-" + rateSet.miss + "）";
    playSe("wrongSe");
  }

  setTimeout(nextQuestion, 400);
}

    }
